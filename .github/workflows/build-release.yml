name: CI / Release

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install Pillow pytest
      - run: pytest

  build-exe:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyinstaller Pillow
      - run: pyinstaller --onefile --console --name btt_postprocess --clean src/btt_postprocess.py
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/btt_postprocess.exe
